<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact — Sunrise Academy</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html">Sunrise Academy</a>
      <button id="nav-toggle" aria-label="Open menu">☰</button>
      <nav id="main-nav" class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="admissions.html">Admissions</a>
        <a href="academics.html">Academics</a>
        <a href="staff.html">Staff</a>
        <a href="calendar.html">Calendar</a>
        <a href="contact.html" class="active cta">Contact</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>Contact Us</h1>
    <p>Email: <a href="mailto:info@sunrise.example">info@sunrise.example</a></p>
    <p>Phone: (555) 123-4567</p>

    <h2>Send us a message</h2>
    <!-- Replace action with your Formspree endpoint or server endpoint -->
    <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <label>
        Your name
        <input type="text" name="name" required>
      </label>
      <label>
        Your email
        <input type="email" name="_replyto" required>
      </label>
      <label>
        Message
        <textarea name="message" rows="6" required></textarea>
      </label>
      <button class="btn" type="submit">Send</button>
      <p id="form-status" class="small" aria-live="polite"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Sunrise Academy</p>
    </div>
  </footer>

  <script src="assets/script.js"></script>
</body>
</html>
